<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>          <a-assets>
        <img id="sky1" src="AdobeStock_336144820.jpg">
        <img id="tex1" src="beach towels.jpg">
        <img id="tex2" src="mikasa ball.jpg">
        <img id="tex3" src="coorslight (1).jpg">
        <img id="tex4" src="assets/texture4.jpg">
        <img id="plane" src="assets/plane.jpg">
      </a-assets>

      <a-sky src="#sky1" radius="30"></a-sky>


      <a-box src="#tex1" position="-1 0.5 -3" rotation="0 45 0" ></a-box>
      <a-sphere src="#tex2" position="0 1.25 -5" radius="1.25" ></a-sphere>
      <a-cylinder src="#tex3" position="1 0.75 -3" rotation="0 180 0" radius="0.5" height="1.5" ></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" ></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
