<!DOCTYPE html>
<html>
  <head>
    <title>Unreal Winter World - 360</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: forest; dressingAmount: 500; dressingColor: #ffffff; groundColor: #d6d6d6; skyType: gradient; skyColor: #242b45"></a-entity>

      <a-entity position="0 0 -4">
        <a-sphere position="0 0.5 0" radius="1" color="#FFFFFF"></a-sphere>
        <a-sphere position="0 1.8 0" radius="0.7" color="#FFFFFF"></a-sphere>
        <a-sphere position="0 2.8 0" radius="0.5" color="#FFFFFF"></a-sphere>

        <a-sphere position="-0.2 3 0.45" radius="0.05" color="#000000"></a-sphere>
        <a-sphere position="0.2 3 0.45" radius="0.05" color="#000000"></a-sphere>

        <a-cone position="0 2.8 0.5" radius-bottom="0.05" radius-top="0.01" height="0.3" rotation="90 0 0" color="#FF8C00"></a-cone>
        
        <a-box position="-0.9 2 0" rotation="0 0 45" width="0.1" height="1" depth="0.1" color="#4b2c20"></a-box>
        <a-box position="0.9 2 0" rotation="0 0 -45" width="0.1" height="1" depth="0.1" color="#4b2c20"></a-box>
      </a-entity>

      <a-octahedron position="2 3 -3" color="#FFD700" radius="0.5"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-octahedron>

      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
