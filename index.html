<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: dream; dressingAmount: 200; dressingColor: #ffffff; groundColor: #f0f8ff"></a-entity>

      <a-entity position="0 0 -5">
        <a-sphere position="0 0.6 0" radius="1" color="#FFFFFF"></a-sphere>     <a-sphere position="0 1.8 0" radius="0.7" color="#FFFFFF"></a-sphere>   <a-sphere position="0 2.8 0" radius="0.5" color="#FFFFFF"></a-sphere>   <a-sphere position="-0.2 2.9 0.45" radius="0.05" color="#222"></a-sphere>
        <a-sphere position="0.2 2.9 0.45" radius="0.05" color="#222"></a-sphere>

        <a-cone position="0 2.8 0.5" radius-bottom="0.06" radius-top="0.01" height="0.4" rotation="90 0 0" color="#FF8C00"></a-cone>
      </a-entity>

      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
